# T2C Data Ingest — local development stack.
#
# Reuses the EXISTING Postgres from t2c_data (the ingest product only adds the
# t2c_data_ingest schema; it never duplicates users/roles). By default the backend/worker
# connect to a Postgres running on the host via host.docker.internal. If you don't have one,
# start the bundled Postgres with:  docker compose --profile with-db up
#
# Ports are offset from t2c_data's defaults so both stacks can run side by side:
#   API 8010 · Frontend 3001 · Spark master 7078/8090 · Spark worker 8091
#
# Prereq: create backend/.env from backend/.env.example (JWT_SECRET_KEY must match t2c_data).
#
# Usage:  docker compose up --build

services:
  spark-master:
    build: ./spark
    image: t2c-data-ingest-spark-runtime:local
    hostname: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    environment:
      PYSPARK_PYTHON: /usr/bin/python3
      PYSPARK_DRIVER_PYTHON: /usr/bin/python3
    ports:
      - "127.0.0.1:7078:7077"
      - "127.0.0.1:8090:8080"
    volumes:
      - ./spark/data:/data
    networks: [t2c]

  # Three workers so distributed execution can be exercised locally (like K8s executors).
  # All workers use the SAME image so libraries/jobs baked into it are identical everywhere.
  # 1 core each + spreadOut (Spark default) => one executor per worker => real distribution.
  spark-worker-1:
    build: ./spark
    image: t2c-data-ingest-spark-runtime:local
    hostname: spark-worker-1
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--cores", "2", "--memory", "2G", "--webui-port", "8081"]
    environment:
      PYSPARK_PYTHON: /usr/bin/python3
      PYSPARK_DRIVER_PYTHON: /usr/bin/python3
    ports:
      - "127.0.0.1:8091:8081"
    volumes:
      - ./spark/data:/data
      - ./spark/jobs:/opt/t2c/spark/jobs
      - ./python_jobs:/opt/t2c/python_jobs
    depends_on: [spark-master]
    networks: [t2c]

  spark-worker-2:
    build: ./spark
    image: t2c-data-ingest-spark-runtime:local
    hostname: spark-worker-2
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--cores", "2", "--memory", "2G", "--webui-port", "8081"]
    environment:
      PYSPARK_PYTHON: /usr/bin/python3
      PYSPARK_DRIVER_PYTHON: /usr/bin/python3
    ports:
      - "127.0.0.1:8092:8081"
    volumes:
      - ./spark/data:/data
      - ./spark/jobs:/opt/t2c/spark/jobs
      - ./python_jobs:/opt/t2c/python_jobs
    depends_on: [spark-master]
    networks: [t2c]

  spark-worker-3:
    build: ./spark
    image: t2c-data-ingest-spark-runtime:local
    hostname: spark-worker-3
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--cores", "2", "--memory", "2G", "--webui-port", "8081"]
    environment:
      PYSPARK_PYTHON: /usr/bin/python3
      PYSPARK_DRIVER_PYTHON: /usr/bin/python3
    ports:
      - "127.0.0.1:8093:8081"
    volumes:
      - ./spark/data:/data
      - ./spark/jobs:/opt/t2c/spark/jobs
      - ./python_jobs:/opt/t2c/python_jobs
    depends_on: [spark-master]
    networks: [t2c]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    hostname: api
    # Dev convenience: apply migrations, seed the local cluster, then serve.
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_local_cluster.py &&
             uvicorn t2c_ingest.main:app --host 0.0.0.0 --port 8000 --no-server-header --proxy-headers"
    env_file: [./backend/.env]
    environment:
      ENV: dev
      SPARK_MASTER_URL: spark://spark-master:7077
      CORS_ALLOW_ORIGINS: http://localhost:3001,http://localhost:5173
    ports:
      - "8010:8000"
    volumes:
      - ./spark/data:/data
      - ./spark/jobs:/opt/spark/jobs
      - ./spark:/opt/t2c/spark
      - ./spark/jars:/app/jars
      - ./python_jobs:/opt/t2c/python_jobs
      - ./backups:/opt/t2c/backups
      - ./archive:/opt/t2c/jobs/archive
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [spark-master]
    networks: [t2c]

  # Proxy com API do Docker restrita a poucos grupos (containers/exec/build), sem publicar porta.
  # O worker fala com ele por TCP em vez de montar o socket cru — assim o worker roda NÃO-root e
  # não tem controle total do daemon (PENTEST-01/03). O socket cru vive só aqui, num container
  # mínimo e sem código de aplicação.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    hostname: docker-socket-proxy
    environment:
      CONTAINERS: "1"   # listar/inspecionar containers (achar o alvo do exec)
      EXEC: "1"         # criar/iniciar exec (spark-submit via docker exec)
      IMAGES: "1"       # builds de runtime (dev)
      BUILD: "1"
      INFO: "1"
      VERSION: "1"
      POST: "1"         # necessário para exec/build (POST); demais grupos permanecem negados
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks: [t2c]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    hostname: t2c_data_ingest_worker
    command: ["python", "scripts/run_worker.py"]
    # NÃO-root (usuário 1001 da imagem). Acessa o daemon Docker apenas via socket-proxy scoped
    # (DOCKER_HOST), sem montar o socket cru.
    env_file: [./backend/.env]
    environment:
      ENV: dev
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      SPARK_MASTER_URL: spark://spark-master:7077
      # Driver host reachable by the spark workers (service name, no underscores).
      SPARK_DRIVER_HOST: worker
      SPARK_DRIVER_BIND_ADDRESS: 0.0.0.0
      # Runtime image build/validation settings.
      RUNTIME_BUILD_CONTEXT_DIR: /opt/t2c/runtime/builds
      RUNTIME_SPARK_SUBMIT_CONTAINER: t2c-data-ingest-spark-worker-1-1
      SPARK_EXPECTED_WORKERS: "3"
    volumes:
      - ./spark/data:/data
      - ./spark/jobs:/opt/spark/jobs
      - ./spark:/opt/t2c/spark
      - ./spark/jars:/app/jars
      - ./python_jobs:/opt/t2c/python_jobs
      - ./archive:/opt/t2c/jobs/archive
      - ./runtime-builds:/opt/t2c/runtime/builds
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [api, spark-master, docker-socket-proxy]
    networks: [t2c]

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    hostname: t2c_data_ingest_scheduler
    command: ["python", "scripts/run_scheduler.py"]
    env_file: [./backend/.env]
    environment:
      ENV: dev
      TZ: America/Sao_Paulo
      SCHEDULER_TIMEZONE: America/Sao_Paulo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [api, worker]
    networks: [t2c]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    hostname: frontend
    ports:
      - "3001:8080"
    depends_on: [api]
    networks: [t2c]

  # Optional: only starts with `--profile with-db`. Use it if you don't already have the
  # t2c_data Postgres running. Point backend/.env DATABASE_URL at this service (host "postgres").
  postgres:
    image: postgres:16-alpine
    profiles: ["with-db"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: t2c_data
    ports:
      - "5433:5432"
    volumes:
      - ingest_pgdata:/var/lib/postgresql/data
    networks: [t2c]

networks:
  t2c:
    driver: bridge

volumes:
  ingest_pgdata:
