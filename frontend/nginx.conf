server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (defense-in-depth). CSP permits the app's own assets + Monaco web workers
  # (Vite `?worker` loads them as blob:) and inline styles (Tailwind). No external origins.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Correct content-type for the PWA manifest (nginx's mime.types lacks .webmanifest).
  location = /site.webmanifest {
    default_type application/manifest+json;
  }

  # SPA fallback: unknown routes serve index.html (React Router handles them).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the ingest backend service on the compose network.
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
