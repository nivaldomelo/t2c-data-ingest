name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, tests, migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: andromeda
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      ENV: dev
      DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/andromeda
      JWT_SECRET_KEY: ci-secret-key-must-be-at-least-32-chars-long-000
      CONNECTION_SECRET_KEY: ci-connection-secret-key-32-chars-minimum-000
      INGEST_DB_SCHEMA: t2c_data_ingest
      REFERENCE_DB_SCHEMA: t2c_data
      CONTROLE_DB_SCHEMA: controle
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff pip-audit
      - name: Lint (ruff)
        run: ruff check src scripts
      - name: Create schemas
        run: |
          PGPASSWORD=ci psql -h localhost -U ci -d andromeda \
            -c 'CREATE SCHEMA IF NOT EXISTS t2c_data_ingest; CREATE SCHEMA IF NOT EXISTS t2c_data; CREATE SCHEMA IF NOT EXISTS controle;'
      - name: Alembic migrations (up then down — reversibility)
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Unit tests
        run: pytest -q
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt || true  # advisory (does not block)

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Build
        run: npm run build
      - name: Dependency audit
        run: npm audit --audit-level=high || true  # advisory (does not block)

  images:
    name: Build & scan images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t t2c-ingest-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t t2c-ingest-frontend:ci ./frontend
      - name: Build spark runtime image
        run: docker build -t t2c-ingest-spark:ci ./spark
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: t2c-ingest-backend:ci
          format: table
          exit-code: "0"          # advisory; set to 1 to block on CRITICAL/HIGH
          severity: CRITICAL,HIGH
          ignore-unfixed: true
