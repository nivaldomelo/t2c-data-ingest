# Cluster-wide Spark defaults for T2C Data Ingest (local docker).
# Override per-environment via a mounted config later (K8s ConfigMap / EKS).

spark.master                     spark://spark-master:7077
spark.local.dir                  /tmp/spark-local
spark.ui.reverseProxy            true

# Event logging (Spark History friendly).
spark.eventLog.enabled           true
spark.eventLog.dir               file:/tmp/spark-events

# Modest local defaults; scale in a real cluster.
spark.executor.memory            1g
spark.executor.cores             1
spark.sql.shuffle.partitions     8

# S3A defaults (used once a Data Lake bucket is wired in). Credentials come from env/secrets.
spark.hadoop.fs.s3a.impl                     org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider com.amazonaws.auth.DefaultAWSCredentialsProviderChain
